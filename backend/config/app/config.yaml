app:
  port: 8080

log:
  level: info
  format: text

llm:
  provider: "ark"
  model: "doubao-seed-2-0-mini-260428"
  api_key: "${ARK_API_KEY}"

mongodb:
  uri: "mongodb://localhost:27017"
  database: "family_wellness"

redis:
  addrs:
    - "127.0.0.1:6379"
  required: true

jwt:
  secret: "${JWT_SECRET}"
  access_token_ttl: 7200
  refresh_token_ttl: 2592000

sms:
  provider: "local"

wechat:
  miniprogram:
    app_id: ""
    app_secret: ""

rate_limit:
  stream_per_minute: 60

embedding:
  provider: "ark" # ark
  model: "doubao-embedding-vision-251215"
  api_key: "${EMBEDDING_API_KEY}"
  dim: 128

mq:
  provider: "local"
  name_server: ""
  group: "knowledgeindexing"
  producer_group: "harness-api"

cos:
  provider: "local"

knowledge_indexing:
  ingest_fetch_allow_hosts: []
  ingest_fetch_allowed_content_type_prefixes: []

admin_static_login:
  enabled: false
  username: "admin"
  password: ""
  user_id: "static-admin"
  uid: 1
