# L1 SafetyGate rules (MVP). Hotline numbers in crisis_templates — verify before production.
rules:
  - id: crisis_self_harm
    patterns:
      - "不想活"
      - "不想活了"
      - "自杀"
      - "轻生"
      - "结束生命"
      - "割腕"
      - "跳楼"
      - "自残"
      - "了结自己"

  - id: crisis_violence
    patterns:
      - "打我"
      - "家暴"
      - "动手打"
      - "要杀我"
      - "威胁我"
      - "人身安全"
      - "打不过"

  - id: medical_boundary
    patterns:
      - "吃什么药"
      - "该吃什么药"
      - "用药建议"
      - "开药"
      - "处方"
      - "诊断一下"
      - "是不是抑郁症"
      - "是不是焦虑症"
      - "药量"
      - "副作用"

  - id: block
    patterns:
      - "色情"
      - "裸照"
      - "做爱视频"
      - "强奸"
      - "仇恨言论"
      - "种族灭绝"
      - "制作炸弹"
      - "毒品交易"
