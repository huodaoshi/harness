<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f3ef" />
    <meta name="description" content="关系情绪 AI — 安全倾诉空间" />
    <title>关系情绪 AI</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/css/app.css" />
  </head>
  <body>
    <div id="app">
      <section id="screen-welcome" class="screen screen--active" aria-label="欢迎">
        <header class="brand">
          <h1>关系情绪 AI</h1>
          <p class="subtitle">一个安全、私密的倾诉角落</p>
        </header>

        <article class="card disclaimer">
          <h2>使用前请知悉</h2>
          <ul>
            <li>本服务<strong>不是</strong>医疗诊断或心理咨询，不能替代专业帮助。</li>
            <li>若你有自伤、自杀或人身危险，请立即联系身边人或拨打危机热线。</li>
            <li>对话内容用于当下陪伴；请勿输入银行卡密码等敏感信息。</li>
          </ul>
          <label class="checkbox-row">
            <input type="checkbox" id="disclaimer-check" />
            <span>我已阅读并理解以上说明</span>
          </label>
        </article>

        <div class="actions">
          <button type="button" id="btn-distress" class="btn btn--primary" disabled>
            我现在很难受
          </button>
          <button type="button" id="btn-normal" class="btn btn--ghost" disabled>
            先聊聊
          </button>
          <button type="button" id="btn-profile-welcome" class="btn btn--ghost" disabled>
            编辑关系档案
          </button>
          <p class="hint">无需填写档案即可开始；填写档案后对话会更懂你。</p>
        </div>
      </section>

      <section id="screen-chat" class="screen" aria-label="对话" hidden>
        <header class="chat-header">
          <button type="button" id="btn-back" class="btn-icon" aria-label="返回">&#8592;</button>
          <button type="button" id="btn-profile-chat" class="btn-icon btn-profile-link" aria-label="关系档案" title="关系档案">档</button>
          <div class="chat-header__title">
            <span id="chat-mode-label">情绪陪伴</span>
            <span id="session-hint" class="session-hint"></span>
          </div>
        </header>

        <div id="crisis-banner" class="crisis-banner" hidden role="alert">
          <h2>你此刻的安全最重要</h2>
          <p id="crisis-body"></p>
          <p class="crisis-meta">如需立即帮助，请联系身边信任的人或当地危机热线。</p>
        </div>

        <div id="messages" class="messages" aria-live="polite"></div>

        <div id="error-bar" class="error-bar" hidden role="alert"></div>

        <form id="chat-form" class="composer">
          <textarea
            id="message-input"
            rows="1"
            placeholder="说说此刻的感受…"
            autocomplete="off"
            enterkeyhint="send"
          ></textarea>
          <button type="submit" id="btn-send" class="btn btn--primary btn--send">发送</button>
        </form>
      </section>

      <section id="screen-profile" class="screen" aria-label="关系档案" hidden>
        <header class="chat-header">
          <button type="button" id="btn-profile-back" class="btn-icon" aria-label="返回">&#8592;</button>
          <div class="chat-header__title">
            <span>关系档案</span>
          </div>
        </header>

        <p id="profile-status" class="profile-status" hidden></p>

        <form id="profile-form" class="profile-form">
          <label class="field">
            <span class="field-label">关于我</span>
            <textarea id="profile-self-note" rows="3" placeholder="性格、状态、你希望 AI 了解的一点背景"></textarea>
          </label>

          <label class="field">
            <span class="field-label">当前议题</span>
            <textarea id="profile-current-issue" rows="2" placeholder="此刻最困扰你的关系议题"></textarea>
          </label>

          <div class="field">
            <div class="field-label-row">
              <span class="field-label">重要他人</span>
              <button type="button" id="btn-add-person" class="btn btn--ghost btn--small">添加</button>
            </div>
            <div id="people-list" class="people-list"></div>
          </div>

          <button type="submit" class="btn btn--primary">保存并返回</button>
        </form>
      </section>
    </div>

    <script type="module" src="/js/app.js"></script>
  </body>
</html>
